# Cloud Build pipeline: build container, push to Artifact Registry, deploy to Cloud Run.
#
# Defaults are set up for an Artifact Registry Docker repo named "cap-images"
# in us-east1 and a Cloud Run service named "commonwealth-ai-landing".
# Override any of these per-trigger or via:
#   gcloud builds submit \
#     --substitutions=_SERVICE=my-svc,_REGION=us-central1,_AR_REPO=my-repo
#
# Required APIs (enable once via console):
#   - Cloud Build, Cloud Run, Artifact Registry
#
# Required IAM on the Cloud Build service account:
#   - roles/run.admin
#   - roles/iam.serviceAccountUser
#   (Console will prompt to grant these on the first trigger run.)

substitutions:
  _SERVICE: commonwealth-ai-landing
  _REGION: us-east1
  _AR_REPO: cap-images
  _PORT: '8080'

steps:
  # 1. Build the container image (tag with commit SHA + latest)
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${SHORT_SHA}
      - --tag
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:latest
      - .

  # 2. Push both tags to Artifact Registry
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}

  # 3. Deploy the new revision to Cloud Run
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --port=${_PORT}
      - --allow-unauthenticated
      - --max-instances=10
      - --min-instances=0
      - --memory=256Mi
      - --cpu=1
      - --concurrency=80
      - --timeout=60s

# Tell Cloud Build to track these images for provenance / vulnerability scanning
images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
